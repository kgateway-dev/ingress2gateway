apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: ingress-myservicea1
  namespace: default
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: ingress-myservicea1-myservicea-foo-org
  traffic:
    cors:
      allowCredentials: false
      allowHeaders:
        - X-Requested-With
        - Content-Type
      allowMethods:
        - GET
        - POST
        - OPTIONS
      allowOrigins:
        - https://example.com
        - https://another.com
      exposeHeaders:
        - X-Expose-One
        - X-Expose-Two
      maxAge: 600
status:
  ancestors: null
