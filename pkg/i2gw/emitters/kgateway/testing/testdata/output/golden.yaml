metadata:
  name: ingress-myservicea1-myservicea-foo-org-0
  namespace: default
spec:
  buffer:
    maxRequestSize: 10Mi
  rateLimit:
    local:
      tokenBucket:
        fillInterval: 1m0s
        maxTokens: 600
        tokensPerFill: 600
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: ingress-myservicea1-myservicea-foo-org
      sectionName: rule-0
status:
  ancestors: null
