apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  annotations:
    gateway.networking.k8s.io/generator: ingress2gateway-v0.5.0-rc1-53-g7c171dc
  name: nginx
  namespace: default
spec:
  gatewayClassName: kgateway
  listeners:
  - hostname: rewrite.localdev.me
    name: rewrite-localdev-me-http
    port: 80
    protocol: HTTP
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  annotations:
    gateway.networking.k8s.io/generator: ingress2gateway-v0.5.0-rc1-53-g7c171dc
  name: proxy-set-headers-test-set-headers-example-com
  namespace: default
spec:
  hostnames:
  - rewrite.localdev.me
  parentRefs:
  - name: nginx
  rules:
  - backendRefs:
    - name: echo-backend
      port: 8080
    matches:
    - path:
        type: RegularExpression
        value: ^/path/one
  - backendRefs:
    - name: echo-backend
      port: 8080
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          replaceFullPath: /after/rewrite
          type: ReplaceFullPath
    matches:
    - path:
        type: PathPrefix
        value: /echo
    name: rule-0
