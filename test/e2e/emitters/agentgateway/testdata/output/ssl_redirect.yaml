apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  annotations:
    gateway.networking.k8s.io/generator: ingress2gateway-v0.5.0
  name: nginx
  namespace: default
spec:
  gatewayClassName: agentgateway
  listeners:
  - hostname: ssl-redirect.localdev.me
    name: ssl-redirect-localdev-me-http
    port: 80
    protocol: HTTP
  - hostname: ssl-redirect.localdev.me
    name: ssl-redirect-localdev-me-https
    port: 443
    protocol: HTTPS
    tls:
      certificateRefs:
      - group: ""
        kind: Secret
        name: ssl-redirect-tls
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  annotations:
    gateway.networking.k8s.io/generator: ingress2gateway-v0.5.0
  name: ssl-redirect-localhost-ssl-redirect-localdev-me
  namespace: default
spec:
  hostnames:
  - ssl-redirect.localdev.me
  parentRefs:
  - name: nginx
    port: 443
  rules:
  - backendRefs:
    - name: echo-backend
      port: 8080
    matches:
    - path:
        type: PathPrefix
        value: /
    name: rule-0
status:
  parents: []
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  annotations:
    gateway.networking.k8s.io/generator: ingress2gateway-v0.5.0
  name: ssl-redirect-localhost-ssl-redirect-localdev-me-http
  namespace: default
spec:
  hostnames:
  - ssl-redirect.localdev.me
  parentRefs:
  - name: nginx
    port: 80
  rules:
  - filters:
    - requestRedirect:
        scheme: https
        statusCode: 308
      type: RequestRedirect
    matches:
    - path:
        type: PathPrefix
        value: /
status:
  parents: null
